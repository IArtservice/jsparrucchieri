<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Parrucchiere</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f5f0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #b87c4f; text-align: center; }
        .card { background: #fffaf5; border-radius: 24px; padding: 16px; margin-bottom: 16px; border: 1px solid #f0e2d4; }
        .btn-confirm { background: #25D366; color: white; border: none; padding: 10px; border-radius: 60px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 10px; border-radius: 60px; cursor: pointer; width: 100%; margin-top: 20px; }
        .login-form { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .login-form input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 60px; border: 1px solid #e0d6cc; }
        .login-form button { background: #b87c4f; color: white; border: none; padding: 12px; width: 100%; border-radius: 60px; cursor: pointer; font-weight: bold; }
        .error { color: red; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://oshrdpohkgathrpdwjxn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nryMp4gt6YgNysZVN8rgnw_t68dnmPT';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function mostraLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-form">
                    <h2>🔐 Accesso Parrucchiere</h2>
                    <input type="email" id="email" placeholder="Email" value="parrucchiere@example.com">
                    <input type="password" id="password" placeholder="Password">
                    <button id="loginBtn">Accedi</button>
                    <div id="loginError" class="error"></div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('loginError').innerText = error.message;
                } else {
                    caricaDashboard();
                }
            };
        }

        async function caricaDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                mostraLogin();
                return;
            }
            const token = session.access_token;

            document.getElementById('app').innerHTML = `
                <div class="container">
                    <h1>📋 Richieste in attesa</h1>
                    <div id="listaPrenotazioni"></div>
                    <button id="logoutBtn" class="btn-logout">Esci</button>
                </div>
            `;
            document.getElementById('logoutBtn').onclick = async () => {
                await supabase.auth.signOut();
                mostraLogin();
            };

            async function caricaPrenotazioni() {
                const listaDiv = document.getElementById('listaPrenotazioni');
                try {
                    const url = `${SUPABASE_URL}/rest/v1/appuntamenti?stato=eq.in_attesa&order=data_ora.asc`;
                    const response = await fetch(url, {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (!response.ok) throw new Error('Errore ' + response.status);
                    const prenotazioni = await response.json();
                    if (prenotazioni.length === 0) {
                        listaDiv.innerHTML = '<p>Nessuna prenotazione in attesa.</p>';
                        return;
                    }
                    listaDiv.innerHTML = '';
                    for (let p of prenotazioni) {
                        const data = new Date(p.data_ora);
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <strong>${p.nome}</strong><br>
                            Tel: ${p.telefono}<br>
                            Servizio: ${p.servizio}<br>
                            Data: ${data.toLocaleDateString()} ore ${data.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}<br>
                            <button class="btn-confirm" data-id="${p.id}">✅ Conferma via WhatsApp</button>
                        `;
                        listaDiv.appendChild(card);
                    }
                    document.querySelectorAll('.btn-confirm').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const id = btn.getAttribute('data-id');
                            const functionUrl = `${SUPABASE_URL}/functions/v1/conferma-parrucchiere`;
                            try {
                                const res = await fetch(functionUrl, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'apikey': SUPABASE_ANON_KEY,
                                        'Authorization': `Bearer ${token}`
                                    },
                                    body: JSON.stringify({ appointmentId: id })
                                });
                                const result = await res.json();
                                if (result.waLink) {
                                    window.open(result.waLink, '_blank');
                                    alert('Messaggio WhatsApp preparato. Invia al cliente.');
                                    caricaPrenotazioni();
                                } else {
                                    alert('Errore: ' + (result.error || 'riprova'));
                                }
                            } catch (err) {
                                alert('Errore di rete: ' + err.message);
                            }
                        });
                    });
                } catch (error) {
                    listaDiv.innerHTML = '<p style="color:red">Errore di caricamento: ' + error.message + '</p>';
                }
            }
            caricaPrenotazioni();
        }

        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                caricaDashboard();
            } else {
                mostraLogin();
            }
        };
    </script>
</body>
</html>
