<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Parrucchiere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Richieste in attesa</h1>
        <div id="listaPrenotazioni"></div>
    </div>
    <script>
        // PROTEZIONE SEMPLICE – cambia la password
        const pwd = prompt("Inserisci la password del parrucchiere:");
        if (pwd !== "parrucchiere2025") {
            document.body.innerHTML = "<h1>Accesso negato</h1>";
            throw new Error("Non autorizzato");
        }

        // ===== CONFIGURAZIONE =====
        const SUPABASE_URL = 'https://nryMp4gt6YgNysZVN8rgnw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nryMp4gt6YgNysZVN8rgnw_t68dnmPT';
        // ==========================

        async function caricaPrenotazioni() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/parrucchiere/appuntamenti?stato=eq.in_attesa&order=data_ora.asc`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            const prenotazioni = await response.json();
            const container = document.getElementById('listaPrenotazioni');
            if (prenotazioni.length === 0) {
                container.innerHTML = '<p>Nessuna prenotazione in attesa.</p>';
                return;
            }
            container.innerHTML = '';
            for (let p of prenotazioni) {
                const data = new Date(p.data_ora);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <strong>${p.nome}</strong><br>
                    Tel: ${p.telefono}<br>
                    Servizio: ${p.servizio}<br>
                    Data: ${data.toLocaleDateString()} ore ${data.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}<br>
                    <button class="btn-confirm" data-id="${p.id}">✅ Conferma via WhatsApp</button>
                `;
                container.appendChild(card);
            }
            document.querySelectorAll('.btn-confirm').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const functionUrl = `${SUPABASE_URL}/functions/v1/conferma-parrucchiere`;
                    const response = await fetch(functionUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        },
                        body: JSON.stringify({ appointmentId: id })
                    });
                    const result = await response.json();
                    if (result.waLink) {
                        window.open(result.waLink, '_blank');
                        alert('Messaggio WhatsApp preparato. Invia al cliente.');
                        caricaPrenotazioni();
                    } else {
                        alert('Errore nella conferma: ' + (result.error || 'riprova'));
                    }
                });
            });
        }
        caricaPrenotazioni();
    </script>
</body>
</html>
